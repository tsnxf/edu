<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>二次函数图像探索</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d7ddea;
      --ink: #1f2a44;
      --muted: #5f6b85;
      --primary: #3a7afe;
      --accent: #00a28a;
      --danger: #d64545;
    }
    * {
      box-sizing: border-box;
      font-family: "SF Pro Text","PingFang SC","Helvetica Neue",Arial,sans-serif;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    .site {
      max-width: 1280px;
      margin: 0 auto;
      padding: 14px 18px 18px;
    }
    .topbar {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      box-shadow: 0 4px 18px rgba(28, 43, 79, 0.06);
    }
    .title {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }
    .auth {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .user-badge {
      font-size: 13px;
      color: var(--muted);
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f8faff;
      display: none;
    }
    .subject-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .subject-tab {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .subject-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .subject-panel {
      display: none;
    }
    .subject-panel.active {
      display: block;
    }
    .subject-empty {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 26px;
      color: var(--muted);
      line-height: 1.65;
      box-shadow: 0 4px 18px rgba(28, 43, 79, 0.06);
    }
    .module {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 520px;
      max-width: 760px;
    }
    .module h2 {
      margin: 0;
      font-size: 18px;
    }
    .module .desc {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
      line-height: 1.45;
    }
    .pc-row {
      display: grid;
      grid-template-columns: 56px 1fr 66px;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .module-block {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fff;
    }
    .module-canvas {
      width: 100%;
      height: 220px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }
    .result-line {
      font-size: 14px;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      line-height: 1.45;
    }
    .beaker-wrap {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8faff;
      padding: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 220px;
    }
    .beaker {
      width: 140px;
      height: 180px;
      border: 3px solid #8ea1c7;
      border-top: 0;
      border-bottom-left-radius: 18px;
      border-bottom-right-radius: 18px;
      position: relative;
      overflow: hidden;
      background: #ffffff;
    }
    .liquid {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 50%;
      background: #9cbcf8;
      transition: .2s;
    }
    .app {
      padding: 0;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(28, 43, 79, 0.06);
    }
    .left {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: calc(100vh - 150px);
      overflow: auto;
    }
    h1 {
      margin: 0;
      font-size: 20px;
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin: 0;
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .tab {
      border: 1px solid var(--line);
      background: #f8faff;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      color: var(--ink);
      transition: .2s;
    }
    .tab.active {
      border-color: var(--primary);
      color: #fff;
      background: var(--primary);
    }
    .control-group {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .control-group h3 {
      margin: 0;
      font-size: 14px;
    }
    .row {
      display: grid;
      grid-template-columns: 24px 1fr 54px;
      align-items: center;
      gap: 8px;
    }
    input[type="range"] {
      width: 100%;
    }
    .value {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      font-size: 13px;
    }
    .checks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    label.ck {
      font-size: 13px;
      display: flex;
      gap: 6px;
      align-items: center;
      color: var(--muted);
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      color: var(--ink);
    }
    button.primary {
      border-color: var(--primary);
      color: var(--primary);
    }
    button.danger {
      border-color: var(--danger);
      color: var(--danger);
    }
    .inline-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .equation {
      font-size: 15px;
      padding: 10px;
      border-radius: 10px;
      background: #f8faff;
      border: 1px solid var(--line);
      font-variant-numeric: tabular-nums;
      word-break: break-word;
    }
    .data {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .metric {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
    }
    .metric b {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .metric span {
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }
    .graph {
      position: relative;
      height: calc(100vh - 150px);
      overflow: hidden;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .legend {
      position: absolute;
      top: 12px;
      right: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.95);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      min-width: 180px;
    }
    .saved-list {
      max-height: 120px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .saved-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }
    .saved-eq {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .modal-wrap {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(20, 30, 54, 0.34);
      z-index: 20;
    }
    .modal-wrap.show {
      display: flex;
    }
    .modal {
      width: min(420px, calc(100vw - 24px));
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 10px 28px rgba(28, 43, 79, 0.2);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      font-weight: 600;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    .field input {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
      outline: none;
    }
    .field input:focus {
      border-color: var(--primary);
    }
    .msg {
      min-height: 18px;
      font-size: 12px;
      color: var(--danger);
    }
    .modal-foot {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }
      .left, .graph {
        height: auto;
      }
      .graph {
        min-height: 66vh;
      }
      .topbar {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="site">
    <header class="topbar">
      <h1 class="title">教学参考</h1>
      <div class="auth">
        <span class="user-badge" id="userBadge"></span>
        <button id="openRegister">注册</button>
        <button id="openLogin" class="primary">登录</button>
        <button id="logoutBtn" class="danger" style="display:none;">退出登录</button>
      </div>
    </header>

    <div class="subject-tabs" id="subjectTabs">
      <button class="subject-tab active" data-subject="math">数学</button>
      <button class="subject-tab" data-subject="physics">物理</button>
      <button class="subject-tab" data-subject="chemistry">化学</button>
    </div>

    <section class="subject-panel active" id="panel-math">
      <div class="app">
        <section class="panel left">
          <h1>二次函数作图仿真</h1>
          <p class="sub">支持“探索 / 一般式 / 顶点式 / 焦点-准线”四个模式，调节参数并观察抛物线关键特征。</p>

          <div class="tabs" id="tabs"></div>

          <div class="control-group">
            <h3>参数</h3>
            <div id="sliders"></div>
          </div>

          <div class="control-group">
            <h3>图像要素</h3>
            <div class="checks">
              <label class="ck"><input type="checkbox" id="showVertex" checked />顶点</label>
              <label class="ck"><input type="checkbox" id="showAxis" checked />对称轴</label>
              <label class="ck"><input type="checkbox" id="showRoots" checked />根</label>
              <label class="ck"><input type="checkbox" id="showFocus" checked />焦点/准线</label>
              <label class="ck"><input type="checkbox" id="showCoords" checked />坐标标注</label>
              <label class="ck"><input type="checkbox" id="showEq" checked />方程标签</label>
            </div>
          </div>

          <div class="inline-buttons">
            <button id="saveCurve" class="primary">保存当前曲线</button>
            <button id="resetParams">重置参数</button>
          </div>
          <button id="clearCurves" class="danger">清空保存曲线</button>

          <div class="equation" id="equation"></div>
          <div class="data" id="metrics"></div>
          <div class="saved-list" id="savedList"></div>
        </section>

        <section class="panel graph">
          <canvas id="canvas"></canvas>
          <div class="legend" id="legend"></div>
        </section>
      </div>
    </section>

    <section class="subject-panel" id="panel-physics">
      <section class="panel module">
        <h2>物理：理想气体定律</h2>
        <p class="desc">通过调节物质的量、温度和体积，观察压强变化以及 P-V 曲线上的对应点。</p>
        <div class="module-block">
          <div class="pc-row">
            <span>n</span>
            <input id="phyN" type="range" min="0.2" max="3" step="0.1" value="1" />
            <span class="value" id="phyNVal">1</span>
          </div>
          <div class="pc-row">
            <span>T</span>
            <input id="phyT" type="range" min="220" max="600" step="5" value="300" />
            <span class="value" id="phyTVal">300</span>
          </div>
          <div class="pc-row">
            <span>V</span>
            <input id="phyV" type="range" min="5" max="60" step="0.5" value="24" />
            <span class="value" id="phyVVal">24</span>
          </div>
        </div>
        <canvas class="module-canvas" id="physicsCanvas"></canvas>
        <div class="module-block">
          <div class="result-line" id="phyPressureKPa"></div>
          <div class="result-line" id="phyPressureAtm"></div>
        </div>
      </section>
    </section>

    <section class="subject-panel" id="panel-chemistry">
      <section class="panel module">
        <h2>化学：酸碱混合 pH</h2>
        <p class="desc">模拟强酸强碱混合，实时计算溶液 pH，并通过液体颜色观察酸碱性变化。</p>
        <div class="module-block">
          <div class="pc-row">
            <span>Ca</span>
            <input id="chemCa" type="range" min="0.01" max="1.0" step="0.01" value="0.1" />
            <span class="value" id="chemCaVal">0.1</span>
          </div>
          <div class="pc-row">
            <span>Va</span>
            <input id="chemVa" type="range" min="5" max="100" step="1" value="25" />
            <span class="value" id="chemVaVal">25</span>
          </div>
          <div class="pc-row">
            <span>Cb</span>
            <input id="chemCb" type="range" min="0.01" max="1.0" step="0.01" value="0.1" />
            <span class="value" id="chemCbVal">0.1</span>
          </div>
          <div class="pc-row">
            <span>Vb</span>
            <input id="chemVb" type="range" min="5" max="100" step="1" value="25" />
            <span class="value" id="chemVbVal">25</span>
          </div>
        </div>
        <div class="beaker-wrap">
          <div class="beaker">
            <div class="liquid" id="chemLiquid"></div>
          </div>
        </div>
        <div class="module-block">
          <div class="result-line" id="chemPh"></div>
          <div class="result-line" id="chemNature"></div>
        </div>
      </section>
    </section>
  </div>

  <div class="modal-wrap" id="authModal">
    <div class="modal">
      <div class="modal-head">
        <span id="modalTitle">会员登录</span>
        <button id="closeModal">关闭</button>
      </div>
      <div class="field">
        <span>用户名</span>
        <input id="authUsername" type="text" />
      </div>
      <div class="field">
        <span>密码</span>
        <input id="authPassword" type="password" />
      </div>
      <div class="msg" id="authMessage"></div>
      <div class="modal-foot">
        <button id="modalAction" class="primary">登录</button>
      </div>
    </div>
  </div>

  <script>
    const modes = [
      { key: "explore", label: "探索模式" },
      { key: "standard", label: "一般式" },
      { key: "vertex", label: "顶点式" },
      { key: "focus", label: "焦点-准线" }
    ];

    const modeConfig = {
      explore: {
        title: "探索模式",
        params: [
          { key: "a", label: "a", min: -4, max: 4, step: 0.1, value: 1 },
          { key: "b", label: "b", min: -10, max: 10, step: 0.1, value: 0 },
          { key: "c", label: "c", min: -12, max: 12, step: 0.1, value: 0 }
        ]
      },
      standard: {
        title: "一般式",
        params: [
          { key: "a", label: "a", min: -4, max: 4, step: 0.1, value: 1 },
          { key: "b", label: "b", min: -10, max: 10, step: 0.1, value: 2 },
          { key: "c", label: "c", min: -12, max: 12, step: 0.1, value: -3 }
        ]
      },
      vertex: {
        title: "顶点式",
        params: [
          { key: "a", label: "a", min: -4, max: 4, step: 0.1, value: 1 },
          { key: "h", label: "h", min: -10, max: 10, step: 0.1, value: 0 },
          { key: "k", label: "k", min: -12, max: 12, step: 0.1, value: 0 }
        ]
      },
      focus: {
        title: "焦点-准线",
        params: [
          { key: "h", label: "h", min: -10, max: 10, step: 0.1, value: 0 },
          { key: "k", label: "k", min: -12, max: 12, step: 0.1, value: 0 },
          { key: "p", label: "p", min: -6, max: 6, step: 0.1, value: 2 }
        ]
      }
    };

    const colors = ["#2b84ff", "#8b5cf6", "#f59e0b", "#22c55e", "#ef4444", "#06b6d4", "#f97316"];
    const state = {
      mode: "explore",
      params: { a: 1, b: 0, c: 0, h: 0, k: 0, p: 2 },
      showVertex: true,
      showAxis: true,
      showRoots: true,
      showFocus: true,
      showCoords: true,
      showEq: true,
      saved: []
    };

    const tabsEl = document.getElementById("tabs");
    const slidersEl = document.getElementById("sliders");
    const equationEl = document.getElementById("equation");
    const metricsEl = document.getElementById("metrics");
    const legendEl = document.getElementById("legend");
    const savedListEl = document.getElementById("savedList");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const subjectTabsEl = document.getElementById("subjectTabs");
    const panelMathEl = document.getElementById("panel-math");
    const panelPhysicsEl = document.getElementById("panel-physics");
    const panelChemistryEl = document.getElementById("panel-chemistry");
    const userBadgeEl = document.getElementById("userBadge");
    const openRegisterEl = document.getElementById("openRegister");
    const openLoginEl = document.getElementById("openLogin");
    const logoutBtnEl = document.getElementById("logoutBtn");
    const authModalEl = document.getElementById("authModal");
    const modalTitleEl = document.getElementById("modalTitle");
    const authUsernameEl = document.getElementById("authUsername");
    const authPasswordEl = document.getElementById("authPassword");
    const modalActionEl = document.getElementById("modalAction");
    const closeModalEl = document.getElementById("closeModal");
    const authMessageEl = document.getElementById("authMessage");
    const physicsCanvasEl = document.getElementById("physicsCanvas");
    const phyNEl = document.getElementById("phyN");
    const phyTEl = document.getElementById("phyT");
    const phyVEl = document.getElementById("phyV");
    const phyNValEl = document.getElementById("phyNVal");
    const phyTValEl = document.getElementById("phyTVal");
    const phyVValEl = document.getElementById("phyVVal");
    const phyPressureKPaEl = document.getElementById("phyPressureKPa");
    const phyPressureAtmEl = document.getElementById("phyPressureAtm");
    const chemCaEl = document.getElementById("chemCa");
    const chemVaEl = document.getElementById("chemVa");
    const chemCbEl = document.getElementById("chemCb");
    const chemVbEl = document.getElementById("chemVb");
    const chemCaValEl = document.getElementById("chemCaVal");
    const chemVaValEl = document.getElementById("chemVaVal");
    const chemCbValEl = document.getElementById("chemCbVal");
    const chemVbValEl = document.getElementById("chemVbVal");
    const chemLiquidEl = document.getElementById("chemLiquid");
    const chemPhEl = document.getElementById("chemPh");
    const chemNatureEl = document.getElementById("chemNature");
    const scale = 32;
    let viewWidth = 0;
    let viewHeight = 0;
    let pixelRatio = window.devicePixelRatio || 1;
    let dragTarget = null;
    let authMode = "login";
    const pcState = {
      physics: { n: 1, t: 300, v: 24 },
      chemistry: { ca: 0.1, va: 25, cb: 0.1, vb: 25 }
    };

    function fmt(v) {
      if (!isFinite(v)) return "无";
      const rounded = Math.abs(v) < 1e-8 ? 0 : v;
      return Number(rounded.toFixed(2)).toString();
    }

    function signed(v) {
      return v >= 0 ? `+${fmt(v)}` : fmt(v);
    }

    function setupTabs() {
      tabsEl.innerHTML = "";
      modes.forEach((m) => {
        const btn = document.createElement("button");
        btn.className = `tab ${state.mode === m.key ? "active" : ""}`;
        btn.textContent = m.label;
        btn.onclick = () => {
          state.mode = m.key;
          const cfg = modeConfig[m.key];
          cfg.params.forEach((p) => state.params[p.key] = p.value);
          renderControls();
          draw();
        };
        tabsEl.appendChild(btn);
      });
    }

    function renderControls() {
      setupTabs();
      slidersEl.innerHTML = "";
      modeConfig[state.mode].params.forEach((p) => {
        const wrap = document.createElement("div");
        wrap.className = "row";
        const label = document.createElement("div");
        label.textContent = p.label;
        const slider = document.createElement("input");
        slider.type = "range";
        slider.min = p.min;
        slider.max = p.max;
        slider.step = p.step;
        slider.value = state.params[p.key];
        const value = document.createElement("div");
        value.className = "value";
        value.textContent = fmt(Number(slider.value));
        slider.oninput = () => {
          state.params[p.key] = Number(slider.value);
          value.textContent = fmt(state.params[p.key]);
          draw();
        };
        wrap.append(label, slider, value);
        slidersEl.appendChild(wrap);
      });
    }

    function graphToCanvas(x, y) {
      return [viewWidth / 2 + x * scale, viewHeight / 2 - y * scale];
    }

    function canvasToGraph(px, py) {
      return [(px - viewWidth / 2) / scale, (viewHeight / 2 - py) / scale];
    }

    function quadraticValue(x) {
      if (state.mode === "vertex") {
        const { a, h, k } = state.params;
        return a * (x - h) * (x - h) + k;
      }
      if (state.mode === "focus") {
        const { h, k, p } = state.params;
        if (Math.abs(p) < 0.05) return NaN;
        return ((x - h) * (x - h)) / (4 * p) + k;
      }
      const { a, b, c } = state.params;
      return a * x * x + b * x + c;
    }

    function getStandardCoeffs() {
      if (state.mode === "vertex") {
        const { a, h, k } = state.params;
        const b = -2 * a * h;
        const c = a * h * h + k;
        return { a, b, c };
      }
      if (state.mode === "focus") {
        const { h, k, p } = state.params;
        if (Math.abs(p) < 0.05) return { a: NaN, b: NaN, c: NaN };
        const a = 1 / (4 * p);
        const b = -h / (2 * p);
        const c = (h * h) / (4 * p) + k;
        return { a, b, c };
      }
      return { a: state.params.a, b: state.params.b, c: state.params.c };
    }

    function getFeatures() {
      if (state.mode === "focus") {
        const { h, k, p } = state.params;
        const vertex = { x: h, y: k };
        const focus = { x: h, y: k + p };
        const directrix = k - p;
        const axisX = h;
        let roots = [];
        if (Math.abs(p) > 0.05) {
          const t = -4 * p * k;
          if (t > 0) {
            const r = Math.sqrt(t);
            roots = [{ x: h - r, y: 0 }, { x: h + r, y: 0 }];
          } else if (Math.abs(t) < 1e-8) {
            roots = [{ x: h, y: 0 }];
          }
        }
        const yInt = quadraticValue(0);
        return { vertex, axisX, roots, yInt, focus, directrix };
      }
      const { a, b, c } = getStandardCoeffs();
      const axisX = Math.abs(a) < 1e-8 ? NaN : -b / (2 * a);
      const vertex = { x: axisX, y: quadraticValue(axisX) };
      const d = b * b - 4 * a * c;
      const roots = [];
      if (Math.abs(a) > 1e-8) {
        if (d > 1e-8) {
          roots.push({ x: (-b - Math.sqrt(d)) / (2 * a), y: 0 });
          roots.push({ x: (-b + Math.sqrt(d)) / (2 * a), y: 0 });
        } else if (Math.abs(d) <= 1e-8) {
          roots.push({ x: -b / (2 * a), y: 0 });
        }
      } else if (Math.abs(b) > 1e-8) {
        roots.push({ x: -c / b, y: 0 });
      }
      return {
        vertex,
        axisX,
        roots,
        yInt: c,
        focus: Math.abs(a) > 1e-8 ? { x: axisX, y: c - (b * b - 1) / (4 * a) } : null,
        directrix: Math.abs(a) > 1e-8 ? c - (b * b + 1) / (4 * a) : null
      };
    }

    function currentEquation() {
      if (state.mode === "vertex") {
        const { a, h, k } = state.params;
        return `y = ${fmt(a)}(x ${h >= 0 ? "-" : "+"} ${fmt(Math.abs(h))})² ${signed(k)}`;
      }
      if (state.mode === "focus") {
        const { h, k, p } = state.params;
        return `(x ${h >= 0 ? "-" : "+"} ${fmt(Math.abs(h))})² = ${fmt(4 * p)}(y ${k >= 0 ? "-" : "+"} ${fmt(Math.abs(k))})`;
      }
      const { a, b, c } = state.params;
      return `y = ${fmt(a)}x² ${signed(b)}x ${signed(c)}`;
    }

    function drawGrid() {
      const w = viewWidth;
      const h = viewHeight;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = "#eef2fb";
      ctx.lineWidth = 1;
      for (let x = 0; x <= w; x += scale) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      for (let y = 0; y <= h; y += scale) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      ctx.strokeStyle = "#b0bad2";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(w / 2, 0);
      ctx.lineTo(w / 2, h);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, h / 2);
      ctx.lineTo(w, h / 2);
      ctx.stroke();
    }

    function drawCurve(curve, color, width = 2.5) {
      const w = viewWidth;
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      let moved = false;
      for (let px = 0; px <= w; px += 2) {
        const [x] = canvasToGraph(px, 0);
        const y = curve(x);
        if (!isFinite(y)) continue;
        const [, py] = graphToCanvas(x, y);
        if (py < -5000 || py > viewHeight + 5000) continue;
        if (!moved) {
          ctx.moveTo(px, py);
          moved = true;
        } else {
          ctx.lineTo(px, py);
        }
      }
      ctx.stroke();
    }

    function drawPoint(x, y, color, size = 5) {
      const [px, py] = graphToCanvas(x, y);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(px, py, size, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawText(text, x, y, color = "#1f2a44") {
      const [px, py] = graphToCanvas(x, y);
      ctx.fillStyle = color;
      ctx.font = "12px sans-serif";
      ctx.fillText(text, px + 6, py - 6);
    }

    function drawSavedCurves() {
      state.saved.forEach((s) => {
        drawCurve((x) => s.a * x * x + s.b * x + s.c, s.color, 1.6);
      });
    }

    function drawMain() {
      drawCurve(quadraticValue, "#2b84ff", 2.8);
      const f = getFeatures();

      if (state.showAxis && isFinite(f.axisX)) {
        const [ax, ] = graphToCanvas(f.axisX, 0);
        ctx.strokeStyle = "#8b5cf6";
        ctx.setLineDash([6, 5]);
        ctx.beginPath();
        ctx.moveTo(ax, 0);
        ctx.lineTo(ax, viewHeight);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      if (state.showVertex && f.vertex && isFinite(f.vertex.x) && isFinite(f.vertex.y)) {
        drawPoint(f.vertex.x, f.vertex.y, "#00a28a", 6);
        if (state.showCoords) drawText(`V(${fmt(f.vertex.x)}, ${fmt(f.vertex.y)})`, f.vertex.x, f.vertex.y, "#00a28a");
      }

      if (state.showRoots) {
        f.roots.forEach((r, i) => {
          drawPoint(r.x, 0, "#d64545", 5);
          if (state.showCoords) drawText(`x${i + 1}=${fmt(r.x)}`, r.x, 0, "#d64545");
        });
      }

      drawPoint(0, f.yInt, "#f59e0b", 5);
      if (state.showCoords) drawText(`(0, ${fmt(f.yInt)})`, 0, f.yInt, "#f59e0b");

      if (state.showFocus && state.mode === "focus") {
        drawPoint(f.focus.x, f.focus.y, "#7c3aed", 5);
        if (state.showCoords) drawText(`F(${fmt(f.focus.x)}, ${fmt(f.focus.y)})`, f.focus.x, f.focus.y, "#7c3aed");
        const [, py] = graphToCanvas(0, f.directrix);
        ctx.strokeStyle = "#7c3aed";
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(0, py);
        ctx.lineTo(viewWidth, py);
        ctx.stroke();
        ctx.setLineDash([]);
        if (state.showCoords) {
          const [xTxt, yTxt] = graphToCanvas(-viewWidth / (2 * scale) + 0.2, f.directrix);
          ctx.fillStyle = "#7c3aed";
          ctx.font = "12px sans-serif";
          ctx.fillText(`准线 y=${fmt(f.directrix)}`, xTxt, yTxt - 8);
        }
      }

      if (state.showEq) {
        ctx.fillStyle = "#2b84ff";
        ctx.font = "13px sans-serif";
        ctx.fillText(currentEquation(), 14, 22);
      }
    }

    function updateInfo() {
      const f = getFeatures();
      equationEl.textContent = currentEquation();
      metricsEl.innerHTML = "";
      const rows = [
        ["顶点", f.vertex ? `(${fmt(f.vertex.x)}, ${fmt(f.vertex.y)})` : "无"],
        ["对称轴", isFinite(f.axisX) ? `x = ${fmt(f.axisX)}` : "无"],
        ["y 截距", fmt(f.yInt)],
        ["实根个数", `${f.roots.length}`]
      ];
      if (state.mode === "focus") {
        rows.push(["焦点", `(${fmt(f.focus.x)}, ${fmt(f.focus.y)})`]);
        rows.push(["准线", `y = ${fmt(f.directrix)}`]);
      }
      rows.forEach(([k, v]) => {
        const el = document.createElement("div");
        el.className = "metric";
        el.innerHTML = `<b>${k}</b><span>${v}</span>`;
        metricsEl.appendChild(el);
      });

      legendEl.innerHTML = `
        <div><b>模式：</b>${modeConfig[state.mode].title}</div>
        <div><b>主曲线：</b><span style="color:#2b84ff">蓝色</span></div>
        <div><b>保存曲线：</b>${state.saved.length} 条</div>
        <div><b>拖拽：</b>可直接拖拽顶点（非一般式）</div>
      `;

      savedListEl.innerHTML = "";
      if (!state.saved.length) {
        savedListEl.textContent = "暂无保存曲线";
        return;
      }
      state.saved.forEach((s, idx) => {
        const item = document.createElement("div");
        item.className = "saved-item";
        item.innerHTML = `<span class="dot" style="background:${s.color}"></span><span class="saved-eq">${s.equation}</span><button data-del="${idx}">删除</button>`;
        savedListEl.appendChild(item);
      });
      savedListEl.querySelectorAll("button[data-del]").forEach((btn) => {
        btn.onclick = () => {
          const i = Number(btn.dataset.del);
          state.saved.splice(i, 1);
          draw();
        };
      });
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      pixelRatio = window.devicePixelRatio || 1;
      viewWidth = Math.max(640, Math.floor(rect.width));
      viewHeight = Math.max(420, Math.floor(rect.height));
      canvas.width = Math.floor(viewWidth * pixelRatio);
      canvas.height = Math.floor(viewHeight * pixelRatio);
      ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
      draw();
    }

    function draw() {
      drawGrid();
      drawSavedCurves();
      drawMain();
      updateInfo();
    }

    function initCheckboxes() {
      ["showVertex", "showAxis", "showRoots", "showFocus", "showCoords", "showEq"].forEach((id) => {
        const el = document.getElementById(id);
        el.checked = state[id];
        el.onchange = () => {
          state[id] = el.checked;
          draw();
        };
      });
    }

    function saveCurrentCurve() {
      const coeff = getStandardCoeffs();
      if (!isFinite(coeff.a) || !isFinite(coeff.b) || !isFinite(coeff.c)) return;
      const color = colors[state.saved.length % colors.length];
      state.saved.push({
        ...coeff,
        color,
        equation: currentEquation()
      });
      draw();
    }

    function resetParams() {
      modeConfig[state.mode].params.forEach((p) => state.params[p.key] = p.value);
      renderControls();
      draw();
    }

    function nearestVertexFromMouse(evt) {
      const rect = canvas.getBoundingClientRect();
      const x = evt.clientX - rect.left;
      const y = evt.clientY - rect.top;
      const f = getFeatures();
      if (!f.vertex) return null;
      const [vx, vy] = graphToCanvas(f.vertex.x, f.vertex.y);
      const d = Math.hypot(x - vx, y - vy);
      return d < 16 ? f.vertex : null;
    }

    function onDragMove(evt) {
      if (!dragTarget) return;
      const rect = canvas.getBoundingClientRect();
      const x = evt.clientX - rect.left;
      const y = evt.clientY - rect.top;
      const [gx, gy] = canvasToGraph(x, y);
      if (state.mode === "vertex") {
        state.params.h = Number(gx.toFixed(2));
        state.params.k = Number(gy.toFixed(2));
      } else if (state.mode === "focus") {
        state.params.h = Number(gx.toFixed(2));
        state.params.k = Number(gy.toFixed(2));
      } else if (state.mode === "explore" || state.mode === "standard") {
        const a = state.params.a;
        state.params.b = Number((-2 * a * gx).toFixed(2));
        state.params.c = Number((a * gx * gx + gy).toFixed(2));
      }
      renderControls();
      draw();
    }

    function bindEvents() {
      document.getElementById("saveCurve").onclick = saveCurrentCurve;
      document.getElementById("clearCurves").onclick = () => {
        state.saved = [];
        draw();
      };
      document.getElementById("resetParams").onclick = resetParams;

      canvas.addEventListener("mousedown", (e) => {
        const v = nearestVertexFromMouse(e);
        if (v) dragTarget = "vertex";
      });
      window.addEventListener("mousemove", onDragMove);
      window.addEventListener("mouseup", () => dragTarget = null);
      window.addEventListener("resize", resize);
    }

    function initSubjectTabs() {
      subjectTabsEl.querySelectorAll(".subject-tab").forEach((tab) => {
        tab.onclick = () => {
          const target = tab.dataset.subject;
          subjectTabsEl.querySelectorAll(".subject-tab").forEach((item) => item.classList.remove("active"));
          tab.classList.add("active");
          panelMathEl.classList.toggle("active", target === "math");
          panelPhysicsEl.classList.toggle("active", target === "physics");
          panelChemistryEl.classList.toggle("active", target === "chemistry");
          if (target === "math") resize();
          if (target === "physics") renderPhysicsModule();
          if (target === "chemistry") renderChemistryModule();
        };
      });
    }

    function calcPhysics() {
      const { n, t, v } = pcState.physics;
      const pressureKPa = (n * 8.314 * t) / v;
      const pressureAtm = pressureKPa / 101.325;
      return { pressureKPa, pressureAtm };
    }

    function renderPhysicsChart() {
      const rect = physicsCanvasEl.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const w = Math.max(300, Math.floor(rect.width));
      const h = Math.max(200, Math.floor(rect.height));
      physicsCanvasEl.width = Math.floor(w * ratio);
      physicsCanvasEl.height = Math.floor(h * ratio);
      const pctx = physicsCanvasEl.getContext("2d");
      pctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      pctx.clearRect(0, 0, w, h);
      pctx.fillStyle = "#ffffff";
      pctx.fillRect(0, 0, w, h);

      const m = { l: 42, r: 14, t: 14, b: 32 };
      const plotW = w - m.l - m.r;
      const plotH = h - m.t - m.b;
      pctx.strokeStyle = "#d7ddea";
      pctx.lineWidth = 1;
      pctx.beginPath();
      pctx.moveTo(m.l, m.t);
      pctx.lineTo(m.l, h - m.b);
      pctx.lineTo(w - m.r, h - m.b);
      pctx.stroke();

      const { n, t, v } = pcState.physics;
      const minV = 5;
      const maxV = 60;
      const maxP = (n * 8.314 * t) / minV;
      const xAt = (val) => m.l + ((val - minV) / (maxV - minV)) * plotW;
      const yAt = (val) => m.t + (1 - val / maxP) * plotH;
      pctx.strokeStyle = "#2b84ff";
      pctx.lineWidth = 2;
      pctx.beginPath();
      let first = true;
      for (let vol = minV; vol <= maxV; vol += 0.4) {
        const pre = (n * 8.314 * t) / vol;
        const x = xAt(vol);
        const y = yAt(pre);
        if (first) {
          pctx.moveTo(x, y);
          first = false;
        } else {
          pctx.lineTo(x, y);
        }
      }
      pctx.stroke();

      const currentP = (n * 8.314 * t) / v;
      const cx = xAt(v);
      const cy = yAt(currentP);
      pctx.fillStyle = "#ef4444";
      pctx.beginPath();
      pctx.arc(cx, cy, 5, 0, Math.PI * 2);
      pctx.fill();

      pctx.fillStyle = "#5f6b85";
      pctx.font = "12px sans-serif";
      pctx.fillText("V(L)", w - m.r - 30, h - 8);
      pctx.fillText("P(kPa)", 8, m.t + 10);
      pctx.fillText(`当前点 (${fmt(v)}, ${fmt(currentP)})`, m.l + 8, m.t + 14);
    }

    function renderPhysicsModule() {
      phyNValEl.textContent = fmt(pcState.physics.n);
      phyTValEl.textContent = fmt(pcState.physics.t);
      phyVValEl.textContent = fmt(pcState.physics.v);
      const result = calcPhysics();
      phyPressureKPaEl.textContent = `压强 P = ${fmt(result.pressureKPa)} kPa`;
      phyPressureAtmEl.textContent = `约等于 ${fmt(result.pressureAtm)} atm`;
      renderPhysicsChart();
    }

    function calcChemistry() {
      const { ca, va, cb, vb } = pcState.chemistry;
      const molesH = ca * va / 1000;
      const molesOH = cb * vb / 1000;
      const totalV = (va + vb) / 1000;
      let ph = 7;
      if (molesH > molesOH) {
        const h = (molesH - molesOH) / totalV;
        ph = -Math.log10(h);
      } else if (molesOH > molesH) {
        const oh = (molesOH - molesH) / totalV;
        ph = 14 + Math.log10(oh);
      }
      ph = Math.max(0, Math.min(14, ph));
      const nature = ph < 7 ? "酸性" : (ph > 7 ? "碱性" : "中性");
      return { ph, nature, totalMl: va + vb };
    }

    function phToColor(ph) {
      const hue = Math.round((ph / 14) * 240);
      return `hsl(${hue}, 75%, 62%)`;
    }

    function renderChemistryModule() {
      chemCaValEl.textContent = fmt(pcState.chemistry.ca);
      chemVaValEl.textContent = fmt(pcState.chemistry.va);
      chemCbValEl.textContent = fmt(pcState.chemistry.cb);
      chemVbValEl.textContent = fmt(pcState.chemistry.vb);
      const result = calcChemistry();
      chemPhEl.textContent = `混合后 pH = ${fmt(result.ph)}`;
      chemNatureEl.textContent = `溶液性质：${result.nature}（总体积 ${fmt(result.totalMl)} mL）`;
      const heightPercent = Math.max(20, Math.min(94, (result.totalMl / 200) * 100));
      chemLiquidEl.style.height = `${heightPercent}%`;
      chemLiquidEl.style.background = phToColor(result.ph);
    }

    function initPcModules() {
      phyNEl.addEventListener("input", () => {
        pcState.physics.n = Number(phyNEl.value);
        renderPhysicsModule();
      });
      phyTEl.addEventListener("input", () => {
        pcState.physics.t = Number(phyTEl.value);
        renderPhysicsModule();
      });
      phyVEl.addEventListener("input", () => {
        pcState.physics.v = Number(phyVEl.value);
        renderPhysicsModule();
      });
      chemCaEl.addEventListener("input", () => {
        pcState.chemistry.ca = Number(chemCaEl.value);
        renderChemistryModule();
      });
      chemVaEl.addEventListener("input", () => {
        pcState.chemistry.va = Number(chemVaEl.value);
        renderChemistryModule();
      });
      chemCbEl.addEventListener("input", () => {
        pcState.chemistry.cb = Number(chemCbEl.value);
        renderChemistryModule();
      });
      chemVbEl.addEventListener("input", () => {
        pcState.chemistry.vb = Number(chemVbEl.value);
        renderChemistryModule();
      });
      renderPhysicsModule();
      renderChemistryModule();
    }

    function getUsers() {
      try {
        const raw = localStorage.getItem("edu_users") || "[]";
        const users = JSON.parse(raw);
        return Array.isArray(users) ? users : [];
      } catch {
        return [];
      }
    }

    function setUsers(users) {
      localStorage.setItem("edu_users", JSON.stringify(users));
    }

    function setCurrentUser(username) {
      if (username) localStorage.setItem("edu_current_user", username);
      else localStorage.removeItem("edu_current_user");
      updateAuthView();
    }

    function getCurrentUser() {
      return localStorage.getItem("edu_current_user") || "";
    }

    function updateAuthView() {
      const current = getCurrentUser();
      const loggedIn = !!current;
      userBadgeEl.style.display = loggedIn ? "inline-flex" : "none";
      userBadgeEl.textContent = loggedIn ? `会员：${current}` : "";
      openRegisterEl.style.display = loggedIn ? "none" : "inline-block";
      openLoginEl.style.display = loggedIn ? "none" : "inline-block";
      logoutBtnEl.style.display = loggedIn ? "inline-block" : "none";
    }

    function openAuthModal(mode) {
      authMode = mode;
      modalTitleEl.textContent = mode === "login" ? "会员登录" : "会员注册";
      modalActionEl.textContent = mode === "login" ? "登录" : "注册";
      authUsernameEl.value = "";
      authPasswordEl.value = "";
      authMessageEl.textContent = "";
      authModalEl.classList.add("show");
    }

    function closeAuthModal() {
      authModalEl.classList.remove("show");
      authMessageEl.textContent = "";
    }

    function submitAuth() {
      const username = authUsernameEl.value.trim();
      const password = authPasswordEl.value;
      if (!username || !password) {
        authMessageEl.textContent = "请输入用户名和密码";
        return;
      }
      const users = getUsers();
      if (authMode === "register") {
        const exists = users.some((u) => u.username === username);
        if (exists) {
          authMessageEl.textContent = "用户名已存在";
          return;
        }
        users.push({ username, password });
        setUsers(users);
        setCurrentUser(username);
        closeAuthModal();
        return;
      }
      const match = users.find((u) => u.username === username && u.password === password);
      if (!match) {
        authMessageEl.textContent = "用户名或密码错误";
        return;
      }
      setCurrentUser(username);
      closeAuthModal();
    }

    function initAuth() {
      updateAuthView();
      openRegisterEl.onclick = () => openAuthModal("register");
      openLoginEl.onclick = () => openAuthModal("login");
      closeModalEl.onclick = closeAuthModal;
      modalActionEl.onclick = submitAuth;
      logoutBtnEl.onclick = () => setCurrentUser("");
      authModalEl.addEventListener("click", (e) => {
        if (e.target === authModalEl) closeAuthModal();
      });
      authPasswordEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") submitAuth();
      });
      authUsernameEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") submitAuth();
      });
    }

    renderControls();
    initCheckboxes();
    bindEvents();
    initSubjectTabs();
    initAuth();
    initPcModules();
    resize();
  </script>
</body>
</html>
