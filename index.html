<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教学参考 - 首页</title>
  <link rel="stylesheet" href="./common.css" />
  <style>
    .placeholder {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(28, 43, 79, 0.06);
      padding: 24px;
      color: var(--muted);
      min-height: 320px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: center;
    }
    .placeholder h2 {
      margin: 0;
      color: var(--ink);
    }
  </style>
</head>
<body>
  <div class="site">
    <header class="topbar">
      <h1 class="title">教学参考</h1>
      <div class="auth">
        <span class="user-badge" id="userBadge"></span>
        <button id="openRegister">注册</button>
        <button id="openLogin" class="primary">登录</button>
        <button id="logoutBtn" class="danger" style="display:none;">退出登录</button>
      </div>
    </header>

    <div class="subject-tabs">
      <a class="subject-tab active" href="./index.html">首页</a>
      <a class="subject-tab" href="./math.html">数学</a>
      <a class="subject-tab" href="./physics.html">物理</a>
      <a class="subject-tab" href="./chemistry.html">化学</a>
    </div>

    <section class="placeholder">
      <h2>首页占位</h2>
      <div>这里作为网站首页入口页，后续可放课程目录、公告、推荐内容。</div>
    </section>
  </div>

  <div class="modal-wrap" id="authModal">
    <div class="modal">
      <div class="modal-head">
        <span id="modalTitle">会员登录</span>
        <button id="closeModal">关闭</button>
      </div>
      <div class="field">
        <span>用户名</span>
        <input id="authUsername" type="text" />
      </div>
      <div class="field">
        <span>密码</span>
        <input id="authPassword" type="password" />
      </div>
      <div class="msg" id="authMessage"></div>
      <div class="modal-foot">
        <button id="modalAction" class="primary">登录</button>
      </div>
    </div>
  </div>

  <script src="./auth.js"></script>
  <script>
    initAuthUI();
  </script>
</body>
</html>
