<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教学参考 - 物理</title>
  <link rel="stylesheet" href="./common.css" />
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d7ddea;
      --ink: #1f2a44;
      --muted: #5f6b85;
      --primary: #3a7afe;
      --danger: #d64545;
    }
    * {
      box-sizing: border-box;
      font-family: "SF Pro Text","PingFang SC","Helvetica Neue",Arial,sans-serif;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    .site {
      max-width: 1080px;
      margin: 0 auto;
      padding: 14px 18px 18px;
    }
    .topbar {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      box-shadow: 0 4px 18px rgba(28, 43, 79, 0.06);
    }
    .title {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }
    .auth {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .user-badge {
      font-size: 13px;
      color: var(--muted);
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f8faff;
      display: none;
    }
    button, .subject-tab {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      color: var(--ink);
      text-decoration: none;
      display: inline-block;
    }
    button.primary, .subject-tab.active {
      border-color: var(--primary);
      color: #fff;
      background: var(--primary);
    }
    button.danger {
      border-color: var(--danger);
      color: var(--danger);
      background: #fff;
    }
    .subject-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .module {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(28, 43, 79, 0.06);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 520px;
    }
    .module h2 {
      margin: 0;
      font-size: 18px;
    }
    .desc {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
      line-height: 1.45;
    }
    .module-block {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fff;
    }
    .pc-row {
      display: grid;
      grid-template-columns: 56px 1fr 66px;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .value {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
    }
    .module-canvas {
      width: 100%;
      height: 280px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }
    .result-line {
      font-size: 14px;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      line-height: 1.45;
    }
    .modal-wrap {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(20, 30, 54, 0.34);
      z-index: 20;
    }
    .modal-wrap.show {
      display: flex;
    }
    .modal {
      width: min(420px, calc(100vw - 24px));
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 10px 28px rgba(28, 43, 79, 0.2);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      font-weight: 600;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    .field input {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
      outline: none;
    }
    .msg {
      min-height: 18px;
      font-size: 12px;
      color: var(--danger);
    }
    .modal-foot {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="site">
    <header class="topbar">
      <h1 class="title">教学参考</h1>
      <div class="auth">
        <span class="user-badge" id="userBadge"></span>
        <button id="openRegister">注册</button>
        <button id="openLogin" class="primary">登录</button>
        <button id="logoutBtn" class="danger" style="display:none;">退出登录</button>
      </div>
    </header>

    <div class="subject-tabs">
      <a class="subject-tab" href="./index.html">首页</a>
      <a class="subject-tab" href="./math.html">数学</a>
      <a class="subject-tab active" href="./physics.html">物理</a>
      <a class="subject-tab" href="./chemistry.html">化学</a>
    </div>

    <section class="module">
      <h2>物理：理想气体定律</h2>
      <p class="desc">通过调节物质的量、温度和体积，观察压强变化以及 P-V 曲线上的对应点。</p>
      <div class="module-block">
        <div class="pc-row">
          <span>n</span>
          <input id="phyN" type="range" min="0.2" max="3" step="0.1" value="1" />
          <span class="value" id="phyNVal">1</span>
        </div>
        <div class="pc-row">
          <span>T</span>
          <input id="phyT" type="range" min="220" max="600" step="5" value="300" />
          <span class="value" id="phyTVal">300</span>
        </div>
        <div class="pc-row">
          <span>V</span>
          <input id="phyV" type="range" min="5" max="60" step="0.5" value="24" />
          <span class="value" id="phyVVal">24</span>
        </div>
      </div>
      <canvas class="module-canvas" id="physicsCanvas"></canvas>
      <div class="module-block">
        <div class="result-line" id="phyPressureKPa"></div>
        <div class="result-line" id="phyPressureAtm"></div>
      </div>
    </section>

    <section class="module">
      <h2>物理：密度与浮力</h2>
      <p class="desc">选择材质或自定义质量与体积，观察物体在水（密度 1kg/L）中的沉浮状态。</p>
      <div class="module-block">
        <div class="pc-row">
          <span>材质</span>
          <select id="phyMaterial" style="width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 4px; font-size: 13px; color: var(--ink);">
            <option value="custom">自定义</option>
            <option value="wood">木头 (0.4 kg/L)</option>
            <option value="ice">冰 (0.92 kg/L)</option>
            <option value="brick">砖块 (2.0 kg/L)</option>
            <option value="aluminum">铝 (2.7 kg/L)</option>
          </select>
          <span></span>
        </div>
        <div class="pc-row">
          <span>m(kg)</span>
          <input id="phyMass" type="range" min="0.1" max="10.0" step="0.1" value="5" />
          <span class="value" id="phyMassVal">5</span>
        </div>
        <div class="pc-row">
          <span>V(L)</span>
          <input id="phyVol" type="range" min="1" max="10.0" step="0.1" value="5" />
          <span class="value" id="phyVolVal">5</span>
        </div>
      </div>
      <canvas class="module-canvas" id="densityCanvas"></canvas>
      <div class="module-block">
        <div class="result-line" id="phyDensityText"></div>
        <div class="result-line" id="phyFloatText"></div>
      </div>
    </section>
  </div>

  <div class="modal-wrap" id="authModal">
    <div class="modal">
      <div class="modal-head">
        <span id="modalTitle">会员登录</span>
        <button id="closeModal">关闭</button>
      </div>
      <div class="field">
        <span>用户名</span>
        <input id="authUsername" type="text" />
      </div>
      <div class="field">
        <span>密码</span>
        <input id="authPassword" type="password" />
      </div>
      <div class="msg" id="authMessage"></div>
      <div class="modal-foot">
        <button id="modalAction" class="primary">登录</button>
      </div>
    </div>
  </div>

  <script src="./auth.js"></script>
  <script>
    const physicsCanvasEl = document.getElementById("physicsCanvas");
    const phyNEl = document.getElementById("phyN");
    const phyTEl = document.getElementById("phyT");
    const phyVEl = document.getElementById("phyV");
    const phyNValEl = document.getElementById("phyNVal");
    const phyTValEl = document.getElementById("phyTVal");
    const phyVValEl = document.getElementById("phyVVal");
    const phyPressureKPaEl = document.getElementById("phyPressureKPa");
    const phyPressureAtmEl = document.getElementById("phyPressureAtm");
    const state = { n: 1, t: 300, v: 24 };

    const densityCanvasEl = document.getElementById("densityCanvas");
    const phyMaterialEl = document.getElementById("phyMaterial");
    const phyMassEl = document.getElementById("phyMass");
    const phyVolEl = document.getElementById("phyVol");
    const phyMassValEl = document.getElementById("phyMassVal");
    const phyVolValEl = document.getElementById("phyVolVal");
    const phyDensityTextEl = document.getElementById("phyDensityText");
    const phyFloatTextEl = document.getElementById("phyFloatText");

    const densityState = { material: "custom", m: 5, v: 5 };
    const materials = {
      wood: { density: 0.40, color: "#8b5a2b" },
      ice: { density: 0.92, color: "#a0e6ff" },
      brick: { density: 2.00, color: "#b22222" },
      aluminum: { density: 2.70, color: "#b0c4de" }
    };

    function fmt(v) {
      const rounded = Math.abs(v) < 1e-8 ? 0 : v;
      return Number(rounded.toFixed(2)).toString();
    }

    function calcPhysics() {
      const pressureKPa = (state.n * 8.314 * state.t) / state.v;
      const pressureAtm = pressureKPa / 101.325;
      return { pressureKPa, pressureAtm };
    }

    function renderChart() {
      const rect = physicsCanvasEl.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const w = Math.max(300, Math.floor(rect.width));
      const h = Math.max(200, Math.floor(rect.height));
      physicsCanvasEl.width = Math.floor(w * ratio);
      physicsCanvasEl.height = Math.floor(h * ratio);
      const ctx = physicsCanvasEl.getContext("2d");
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, w, h);

      const m = { l: 42, r: 14, t: 14, b: 32 };
      const plotW = w - m.l - m.r;
      const plotH = h - m.t - m.b;
      const minV = 5;
      const maxV = 60;
      const maxP = (state.n * 8.314 * state.t) / minV;
      const xAt = (val) => m.l + ((val - minV) / (maxV - minV)) * plotW;
      const yAt = (val) => m.t + (1 - val / maxP) * plotH;

      ctx.strokeStyle = "#d7ddea";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(m.l, m.t);
      ctx.lineTo(m.l, h - m.b);
      ctx.lineTo(w - m.r, h - m.b);
      ctx.stroke();

      ctx.strokeStyle = "#2b84ff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      let first = true;
      for (let vol = minV; vol <= maxV; vol += 0.4) {
        const pre = (state.n * 8.314 * state.t) / vol;
        const x = xAt(vol);
        const y = yAt(pre);
        if (first) {
          ctx.moveTo(x, y);
          first = false;
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.stroke();

      const currentP = (state.n * 8.314 * state.t) / state.v;
      ctx.fillStyle = "#ef4444";
      ctx.beginPath();
      ctx.arc(xAt(state.v), yAt(currentP), 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#5f6b85";
      ctx.font = "12px sans-serif";
      ctx.fillText("V(L)", w - m.r - 30, h - 8);
      ctx.fillText("P(kPa)", 8, m.t + 10);
      ctx.fillText(`当前点 (${fmt(state.v)}, ${fmt(currentP)})`, m.l + 8, m.t + 14);
    }

    function renderDensityChart() {
      const rect = densityCanvasEl.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const w = Math.max(300, Math.floor(rect.width));
      const h = Math.max(200, Math.floor(rect.height));
      densityCanvasEl.width = Math.floor(w * ratio);
      densityCanvasEl.height = Math.floor(h * ratio);
      const ctx = densityCanvasEl.getContext("2d");
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, w, h);

      const poolY = h * 0.45;
      
      ctx.fillStyle = "rgba(58, 122, 254, 0.15)";
      ctx.fillRect(0, poolY, w, h - poolY);
      
      ctx.strokeStyle = "#3a7afe";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, poolY);
      ctx.lineTo(w, poolY);
      ctx.stroke();

      const density = densityState.m / densityState.v;
      let blockColor = "#fccc50";
      let textColor = "#1f2a44";
      if (densityState.material !== "custom") {
        blockColor = materials[densityState.material].color;
        if (densityState.material === "brick" || densityState.material === "wood") {
            textColor = "#fff";
        }
      }

      const blockEdge = Math.pow(densityState.v, 1/3) * 20 + 20;
      const blockX = w / 2 - blockEdge / 2;
      let blockY = poolY;

      if (density < 1.0) {
        const submerged = density;
        blockY = poolY - blockEdge * (1 - submerged);
      } else {
        blockY = h - blockEdge;
      }

      if (blockY + blockEdge > poolY) {
         ctx.fillStyle = "rgba(0,0,0,0.1)";
         ctx.fillRect(blockX, Math.max(poolY, blockY), blockEdge, blockY + blockEdge - Math.max(poolY, blockY));
      }

      ctx.fillStyle = blockColor;
      ctx.fillRect(blockX, blockY, blockEdge, blockEdge);
      ctx.strokeStyle = "rgba(0,0,0,0.2)";
      ctx.lineWidth = 1;
      ctx.strokeRect(blockX, blockY, blockEdge, blockEdge);

      ctx.fillStyle = textColor;
      ctx.font = "bold 12px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(`${fmt(densityState.m)}kg`, blockX + blockEdge / 2, blockY + blockEdge / 2);
    }
    
    function renderDensity() {
      phyMassValEl.textContent = fmt(densityState.m);
      phyVolValEl.textContent = fmt(densityState.v);
      const density = densityState.m / densityState.v;
      phyDensityTextEl.textContent = `密度 ρ = ${fmt(density)} kg/L`;
      if (density < 1.0) {
        phyFloatTextEl.textContent = "状态：漂浮在水面上";
        phyFloatTextEl.style.color = "#3a7afe";
      } else if (Math.abs(density - 1.0) < 0.01) {
        phyFloatTextEl.textContent = "状态：悬浮在水中";
        phyFloatTextEl.style.color = "#1f2a44";
      } else {
        phyFloatTextEl.textContent = "状态：沉入水底";
        phyFloatTextEl.style.color = "#d64545";
      }
      renderDensityChart();
    }

    function renderPhysics() {
      phyNValEl.textContent = fmt(state.n);
      phyTValEl.textContent = fmt(state.t);
      phyVValEl.textContent = fmt(state.v);
      const result = calcPhysics();
      phyPressureKPaEl.textContent = `压强 P = ${fmt(result.pressureKPa)} kPa`;
      phyPressureAtmEl.textContent = `约等于 ${fmt(result.pressureAtm)} atm`;
      renderChart();
    }

    function bind() {
      phyNEl.addEventListener("input", () => {
        state.n = Number(phyNEl.value);
        renderPhysics();
      });
      phyTEl.addEventListener("input", () => {
        state.t = Number(phyTEl.value);
        renderPhysics();
      });
      phyVEl.addEventListener("input", () => {
        state.v = Number(phyVEl.value);
        renderPhysics();
      });

      phyMaterialEl.addEventListener("change", (e) => {
        const mat = e.target.value;
        densityState.material = mat;
        if (mat !== "custom") {
          const d = materials[mat].density;
          densityState.m = densityState.v * d;
          phyMassEl.value = densityState.m;
        }
        renderDensity();
      });

      phyMassEl.addEventListener("input", (e) => {
        densityState.m = Number(e.target.value);
        densityState.material = "custom";
        phyMaterialEl.value = "custom";
        renderDensity();
      });

      phyVolEl.addEventListener("input", (e) => {
        densityState.v = Number(e.target.value);
        if (densityState.material !== "custom") {
           const d = materials[densityState.material].density;
           densityState.m = densityState.v * d;
           phyMassEl.value = densityState.m;
        }
        renderDensity();
      });

      window.addEventListener("resize", () => {
        renderChart();
        renderDensityChart();
      });
    }

    initAuthUI();
    bind();
    renderPhysics();
    renderDensity();
  </script>
</body>
</html>
